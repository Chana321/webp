<!DOCTYPE html>
<html lang="th">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LAND PRIME</title>
  <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --blue:#185FA5;--blue-light:#E6F1FB;--blue-mid:#378ADD;
      --green-light:#EAF3DE;--green-dark:#3B6D11;
      --coral-light:#FAECE7;--coral-dark:#993C1D;
      --yellow-light:#FEF9C3;--yellow-dark:#854D0E;
      --gray:#6b7280;--border:#e5e7eb;--bg:#f0f4f9;
    }
    body{font-family:'Prompt',sans-serif;background:var(--bg);color:#1a1a1a;min-height:100vh;overflow-x:hidden}
    #bgCanvas{position:fixed;inset:0;z-index:0;pointer-events:none}
    .page{position:relative;z-index:1;max-width:1140px;margin:0 auto;padding:0 28px 60px}
    .hero{padding:56px 0 40px;display:flex;align-items:flex-end;justify-content:space-between;gap:24px;flex-wrap:wrap;border-bottom:1px solid var(--border);margin-bottom:32px}
    .hero-badge{display:inline-flex;align-items:center;gap:6px;font-size:11px;font-weight:600;letter-spacing:.1em;color:var(--blue);background:var(--blue-light);padding:5px 14px;border-radius:20px;margin-bottom:18px;text-transform:uppercase}
    .hero-badge::before{content:'';width:6px;height:6px;border-radius:50%;background:var(--blue-mid);animation:pulse 2s infinite}
    @keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(1.4)}}
    .hero h1{font-size:clamp(32px,5vw,52px);font-weight:700;line-height:1.15;color:#0f172a;margin-bottom:10px}
    .hero h1 span{color:var(--blue-mid)}
    .hero-sub{font-size:15px;color:var(--gray)}
    .hero-stat {
    background: rgb(255, 255, 255);
    border: 1px solid var(--border);
    border-radius: 20px;       /* เท่ากับ .chip */
    padding: 7px 18px;         /* เท่ากับ .chip */
    display: inline-flex;      /* เปลี่ยนเป็น flex เพื่อให้เนื้อหาอยู่บรรทัดเดียว */
    align-items: center;
    gap: 6px;                  /* ระยะห่างระหว่างตัวเลขกับตัวอักษร */
    min-width: auto;           /* ยกเลิกความกว้างขั้นต่ำ */
}
    .hero-stat-n {
    font-size: 20px;           /* ลดจาก 36px */
    font-weight: 700;
    color: var(--blue);
    line-height: 1.1;
}
    .hero-stat-l {
    font-size: 14px;           /* ลดจาก 13px */
    color: var(--gray);
    margin-top: 2px;           /* ลดระยะห่างด้านบน */
}
    /* --- ส่วนฟิลเตอร์ที่ปรับให้ Responsive --- */
    .filters-bar {
        display: flex;
        gap: 8px;
        flex-wrap: wrap; 
        margin-bottom: 32px;
        align-items: center;
    }

    .filters-label {
        font-size: 13px;
        color: var(--gray);
        margin-right: 4px;
        /* มือถือ: ให้คำว่า "กรอง :" แยกบรรทัดเพื่อให้ปุ่มเรียงกันสวย */
        flex: 0 0 100%; 
        margin-bottom: 4px;
    }

    .chip {
        font-family: 'Prompt', sans-serif;
        font-size: 13px;
        padding: 10px 18px; 
        border-radius: 20px;
        border: 1px solid var(--border);
        background: white;
        color: var(--gray);
        cursor: pointer;
        transition: all .2s;
        /* มือถือ: แบ่ง 2 คอลัมน์ (50% - ระยะห่าง) */
        flex: 1 1 calc(50% - 8px); 
        text-align: center;
        white-space: nowrap;
    }

    .chip:hover { border-color: var(--blue-mid); color: var(--blue-mid); }
    .chip.active {
        background: var(--blue);
        color: white;
        border-color: var(--blue);
        box-shadow: 0 4px 14px rgba(24, 95, 165, 0.3);
    }

    /* สถิติผลการค้นหา */
    .hero-stat {
        flex: 0 0 100%; 
        justify-content: center;
        margin-top: 8px;
        background: white;
        border: 1px solid var(--border);
        border-radius: 20px;
        padding: 7px 18px;
        display: inline-flex;
        align-items: center;
        gap: 6px;
    }

    /* --- ปรับแต่งสำหรับหน้าจอ Desktop (กว้างกว่า 768px) --- */
    @media (min-width: 768px) {
        .filters-label {
            flex: 0 0 auto; 
            margin-bottom: 0;
        }
        .chip {
            flex: 0 0 auto; /* ปุ่มกว้างตามตัวอักษร ไม่ขยายเต็มหน้าจอ */
            padding: 7px 18px;
        }
        .hero-stat {
            flex: 0 0 auto;
            margin-top: 0;
            margin-left: auto; /* ดันสถิติไปไว้ขวาสุด */
        }
    }

    .sec-label {
        font-size: 12px;
        font-weight: 600;
        letter-spacing: .08em;
        text-transform: uppercase;
        color: var(--gray);
        margin-bottom: 18px;
    }
    .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(270px,1fr));gap:20px}
    .card{background:white;border:1px solid var(--border);border-radius:18px;overflow:hidden;position:relative;opacity:0;transform:translateY(24px)}
    .card.visible{opacity:1;transform:translateY(0);transition:opacity .45s ease,transform .45s ease,box-shadow .25s,border-color .2s}
    .card.visible:hover{transform:translateY(-6px) scale(1.01);box-shadow:0 20px 48px rgba(0,0,0,.10);border-color:#c7d9ef}
    .card::after{content:'';position:absolute;inset:0;border-radius:18px;background:linear-gradient(135deg,rgba(255,255,255,.15) 0%,rgba(255,255,255,0) 60%);opacity:0;transition:opacity .25s;pointer-events:none}
    .card.visible:hover::after{opacity:1}
    .card-img{position:relative;height:182px;overflow:hidden;background:var(--blue-light)}
    .card-img img{width:100%;height:100%;object-fit:cover;display:block;transition:transform .5s ease}
    .card.visible:hover .card-img img{transform:scale(1.06)}
    .card-tag{position:absolute;top:11px;left:11px;font-size:11px;font-weight:600;padding:3px 11px;border-radius:20px}
    
    /* ── สีป้ายกำกับใหม่ ── */
    .tag-house { background: var(--blue-light); color: var(--blue); }
    .tag-landhouse { background: var(--green-light); color: var(--green-dark); }
    .tag-large-land { background: var(--yellow-light); color: var(--yellow-dark); }

    .card-fav{position:absolute;top:11px;right:11px;width:32px;height:32px;background:rgba(255,255,255,.9);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:15px}
    .card-body{padding:16px 18px 18px}
    .card-loc{font-size:11px;color:var(--gray);margin-bottom:5px;display:flex;align-items:center;gap:4px}
    .card-loc svg{width:11px;height:11px;flex-shrink:0}
    .card-name{font-size:16px;font-weight:600;color:#0f172a;margin-bottom:6px}
    .card-desc{font-size:13px;color:var(--gray);margin-bottom:14px;line-height:1.55}
    .card-foot{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:12px}
    .card-price{font-size:18px;font-weight:700;color:var(--blue)}
    .card-price small{font-size:11px;font-weight:400;color:var(--gray);margin-left:3px}
    .card-area{font-size:12px;color:var(--gray)}
    .card-btn{display:block;width:100%;padding:10px;text-align:center;border-radius:10px;border:1px solid var(--border);font-family:'Prompt',sans-serif;font-size:13px;font-weight:500;color:#0f172a;cursor:pointer;background:none;transition:background .15s,border-color .15s,color .15s}
    .card-btn:hover{background:var(--blue);color:white;border-color:var(--blue)}
    .empty{grid-column:1/-1;text-align:center;padding:48px;color:var(--gray);font-size:14px}
    footer{text-align:center;padding:40px 0 0;color:#adb5bd;font-size:13px}
    .nav{position:fixed;top:20px;left:30px;z-index:999}
    .logo{height:40px;width:auto;object-fit:contain;cursor:pointer;transition:transform .2s ease}
    .logo:hover{transform:scale(1.05)}

    /* ── Detail Modal ── */
    .modal-overlay{
      position:fixed;inset:0;
      background:rgba(0,0,0,0.58);
      display:none;align-items:center;justify-content:center;
      z-index:9999;padding:16px;
    }
    .modal-overlay.open{display:flex}
    .modal-box{
      background:white;
      width:100%;max-width:660px;
      border-radius:22px;
      overflow:hidden;
      animation:popIn .3s cubic-bezier(.22,.68,0,1.2);
      max-height:92vh;
      display:flex;flex-direction:column;
    }
    @keyframes popIn{from{transform:scale(0.88);opacity:0}to{transform:scale(1);opacity:1}}

    /* Gallery */
   .modal-gallery {
  position: relative;
  height: 280px;
  overflow: hidden;
}

.gal-track {
  display: flex;
  height: 100%;
  transition: transform 0.45s cubic-bezier(.25,.8,.25,1);
}

.gal-slide {
  flex: 0 0 100%;  /* 🔥 ตัวนี้จบปัญหา */
  height: 100%;
}

.gal-slide img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
}
    .gal-btn{
      position:absolute;top:50%;transform:translateY(-50%);
      background:rgba(255,255,255,.82);border:none;cursor:pointer;
      width:38px;height:38px;border-radius:50%;font-size:20px;
      display:flex;align-items:center;justify-content:center;
      transition:background .15s;color:#0f172a;z-index:2;
    }
    .gal-btn:hover{background:white}
    .gal-prev{left:12px}
    .gal-next{right:12px}
    .gal-dots{
      position:absolute;bottom:12px;left:50%;transform:translateX(-50%);
      display:flex;gap:6px;z-index:2;
    }
    .gal-dot{width:7px;height:7px;border-radius:50%;background:rgba(255,255,255,.5);cursor:pointer;transition:background .2s}
    .gal-dot.active{background:white}
    .modal-close{
      position:absolute;top:12px;right:12px;
      width:34px;height:34px;border-radius:50%;
      background:rgba(255,255,255,.85);border:none;cursor:pointer;
      font-size:17px;display:flex;align-items:center;justify-content:center;
      color:#0f172a;z-index:10;transition:background .15s;
    }
    .modal-close:hover{background:white}

    /* Body */
    .modal-body{padding:22px 24px 26px;overflow-y:auto}
    .modal-tag-row{display:flex;align-items:center;gap:8px;margin-bottom:10px;flex-wrap:wrap}
    .modal-tag{font-size:11px;font-weight:600;padding:3px 12px;border-radius:20px}
    .modal-title{font-size:21px;font-weight:700;color:#0f172a;margin-bottom:5px;line-height:1.3}
    .modal-loc{font-size:13px;color:var(--gray);display:flex;align-items:center;gap:4px;margin-bottom:20px}
    .modal-loc svg{width:13px;height:13px;flex-shrink:0}

    .detail-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:20px}
    .detail-item{background:var(--bg);border-radius:12px;padding:12px 14px}
    .detail-label{font-size:11px;color:var(--gray);margin-bottom:4px}
    .detail-value{font-size:15px;font-weight:600;color:#0f172a}
    .detail-price .detail-value{color:var(--blue);font-size:17px}

    .modal-section-label{font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--gray);margin-bottom:7px}
    .modal-desc-text{font-size:14px;color:#374151;line-height:1.75;margin-bottom:22px}

    .modal-cta{display:flex;gap:10px;flex-wrap:wrap}
   /* สไตล์พื้นฐานของทุกปุ่มใน Modal */
/* --- ส่วนปุ่มหลัก --- */
.btn-primary, .btn-line, .btn-map {
    flex: 1;
    min-width: 80px;          /* ลดจาก 130px ให้เล็กลง */
    padding: 10px 4px;        /* ลดความหนาของปุ่ม */
    border-radius: 12px;
    text-decoration: none;    /* เอาเส้นใต้ออกสำหรับแท็ก a */
    font-family: 'Prompt', sans-serif;
    font-size: 13px;          /* ลดขนาดตัวอักษรลงเล็กน้อยให้พอดีปุ่ม */
    font-weight: 600;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 4px;
    transition: all .15s;
    color: white !important;
}

/* สีเดิมที่คุณใช้ */
.btn-primary { background: var(--blue); }
.btn-primary:hover { background: #0c477d; }

.btn-line { background: #00b900; }
.btn-line:hover { opacity: .88; }

.btn-map { background: #00026e; } /* สีแดงสำหรับ Google Maps */

/* --- ส่วนปุ่มปิด (ปุ่ม Outline) --- */
.btn-outline {
    flex: 1;
    min-width: 80px;
    padding: 10px 4px;
    border-radius: 12px;
    border: 1px solid var(--border);
    background: white;
    font-family: 'Prompt', sans-serif;
    font-size: 13px;
    font-weight: 500;
    color: #0f172a;
    cursor: pointer;
    transition: background .15s;
}
.btn-outline:hover { background: var(--bg); }
    @media(max-width:500px){
      .detail-grid{grid-template-columns:1fr 1fr}
      .modal-gallery{height:280px}
    }

/* คอนเทนเนอร์หลักของปุ่ม FAB */
.fab-wrapper {
    position: fixed;
    bottom: 25px;
    right: 25px;
    z-index: 9999; /* ให้ลอยทับทุกอย่าง */
    display: flex;
    flex-direction: column; /* เรียงจากบนลงล่าง */
    align-items: center;
    gap: 12px;
}

/* คอนเทนเนอร์สำหรับปุ่มย่อย (FB, Line, Tel) */
.fab-options {
    display: flex;
    flex-direction: column; /* ปุ่มย่อยเรียงต่อกันในแนวตั้ง */
    gap: 10px;
    visibility: hidden;
    opacity: 0;
    /* จุดสำคัญ: ให้เริ่มจากข้างล่างแล้วค่อยพุ่งขึ้น */
    transform: translateY(40px) scale(0.6); 
    transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    will-change: transform, opacity;
}

/* แสดงปุ่มย่อยเมื่อถูกสั่งโชว์ */
.fab-options.show {
    visibility: visible;
    opacity: 1;
    transform: translateY(0) scale(1); /* พุ่งขึ้นมาที่ตำแหน่งปกติเหนือปุ่มหลัก */
}

/* ✅ ปรับแต่งปุ่มหลัก: ไร้ขอบ และพื้นหลังสีเทาจางๆ แบบในรูป */
.fab-main {
    width: 56px;
    height: 56px;
    border-radius: 50%;
    /* ✅ เปลี่ยนเป็นสีเทาจางๆ (สมมติว่าเป็นสีเทาอ่อนๆ) */
    background: #f1f3f5; 
    /* ✅ เอา border ออก (ไร้ขอบ) */
    border: none; 
    /* ✅ เงาให้นุ่มนวลขึ้นเพื่อให้ปุ่มดู "ลอย" ขึ้นมา */
    box-shadow: 0 4px 18px rgba(0, 0, 0, 0.15); 
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.3s ease;
    z-index: 2;
    padding: 0; /* เคลียร์ padding เพื่อให้รูปอยู่กึ่งกลาง */
    overflow: hidden;
    will-change: transform, background;
    /* ✅ เพิ่ม 3 บรรทัดนี้เพื่อแก้ปัญหาขอบส้ม/ขอบฟ้า */
    outline: none;           /* ลบเส้นขอบ Focus ของ Browser */
    -webkit-tap-highlight-color: transparent; /* ลบแถบสีเวลาแตะในมือถือ */
    user-select: none;       /* ป้องกันการคลุมดำที่รูปภาพ */
    
}

/* จัดการขนาดรูปภาพข้างในปุ่มหลัก (หูฟัง) */
.fab-main img {
    width: 32px;  /* ขนาดที่เหมาะสมกับปุ่ม 56px */
    height: 32px;
    object-fit: contain;
    transition: transform 0.3s ease;
}

/* เมื่อกดเปิดเมนู (Active) */
.fab-main.active {
    /* ให้ขยายตัวเล็กน้อยแทนการหมุน */
    transform: scale(1.1); 
    /* ✅ เปลี่ยนพื้นหลังให้เข้มขึ้นนิดหน่อย */
    background: #e9ecef; 
    /* ✅ เอา border-color ออกเช่นกัน */
}

/* สไตล์ของปุ่มย่อย (FB, Line, Tel) */
.fab-mini {
    width: 46px;
    height: 46px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    color: white;
    text-decoration: none;
    box-shadow: 0 4px 10px rgba(0,0,0,0.15);
    transition: transform 0.2s;
}

/* เอฟเฟกต์เมื่อเมาส์ชี้ไปที่ปุ่มย่อย */
.fab-mini:hover { transform: scale(1.1); }
.fab-mini.line { background: #00b900; }
.fab-mini.tel { background: var(--blue-mid); }
.fab-mini.fb { background: #1877F2; }

/* --- ส่วนของ Responsive (ทำให้เล็กลงในมือถือ) --- */
@media (max-width: 480px) {
  .fab-wrapper {
    bottom: 20px; /* ชิดขอบล่างขึ้นอีกนิด */
    right: 20px;
    gap: 8px; /* ลดระยะห่างระหว่างปุ่ม */
  }

  /* ปุ่มหลัก (+) ให้เล็กลง */
  .fab-main {
    width: 45px;
    height: 45px;
  }

  /* ปรับขนาดรูปในมือถือให้เล็กลงตามปุ่ม */
  .fab-main img {
    width: 30px;
    height: 30px;
  }

  /* ปุ่มย่อย (FB, Line, Tel) ให้เล็กลง */
  .fab-mini {
    width: 40px;
    height: 40px;
  }

  /* ปรับระยะพุ่งตอนดีดขึ้นให้สั้นลงตามขนาดปุ่ม */
  .fab-options {
    transform: translateY(20px) scale(0.6);
    gap: 8px;
  }
}
  </style>
</head>

    (function () {
      const canvas = document.getElementById('bgCanvas');
      const ctx = canvas.getContext('2d');
      let W, H, blobs, lines;
      function resize() { W = canvas.width = window.innerWidth; H = canvas.height = document.body.scrollHeight; }
      function initBlobs() {
        blobs = Array.from({ length: 6 }, (_, i) => ({
          x: Math.random()*W, y: Math.random()*H,
          r: 180+Math.random()*220,
          dx:(Math.random()-.5)*.4, dy:(Math.random()-.5)*.4,
          hue: i%2===0 ? '#b5d4f4' : '#c0dd97',
        }));
      }
      function initLines() {
        lines = Array.from({ length: 22 }, () => ({
          x:Math.random()*W, y:Math.random()*H,
          len:40+Math.random()*80,
          angle:Math.random()*Math.PI*2,
          speed:.003+Math.random()*.005,
          alpha:.07+Math.random()*.08,
        }));
      }
      function draw() {
        ctx.clearRect(0,0,W,H);
        blobs.forEach(b => {
          b.x+=b.dx; b.y+=b.dy;
          if(b.x<-b.r)b.x=W+b.r; if(b.x>W+b.r)b.x=-b.r;
          if(b.y<-b.r)b.y=H+b.r; if(b.y>H+b.r)b.y=-b.r;
          const g=ctx.createRadialGradient(b.x,b.y,0,b.x,b.y,b.r);
          g.addColorStop(0,b.hue+'cc'); g.addColorStop(1,b.hue+'00');
          ctx.beginPath(); ctx.arc(b.x,b.y,b.r,0,Math.PI*2);
          ctx.fillStyle=g; ctx.fill();
        });
        lines.forEach(l => {
          l.angle+=l.speed;
          const x2=l.x+Math.cos(l.angle)*l.len, y2=l.y+Math.sin(l.angle)*l.len;
          ctx.beginPath(); ctx.moveTo(l.x,l.y); ctx.lineTo(x2,y2);
          ctx.strokeStyle=`rgba(24,95,165,${l.alpha})`; ctx.lineWidth=1; ctx.stroke();
        });
        requestAnimationFrame(draw);
      }
      function init(){ resize(); initBlobs(); initLines(); draw(); }
      window.addEventListener('resize',()=>{ resize(); initBlobs(); });
      document.fonts.ready.then(init);
    })();

        if (e.isIntersecting) {
          setTimeout(() => e.target.classList.add('visible'), i * 60);
          observer.unobserve(e.target);
        }
      });
    }, { threshold: 0.1 });

    /* ── 3. แก้ไขฟังก์ชันการแสดงผล (Render) ── */
    function render(f) {
      document.querySelectorAll('.chip').forEach(c => c.classList.toggle('active', c.dataset.f === f));
      let items = DATA.map((d, i) => ({ ...d, _i: i }));
      
      // ตรรกะการ Filter
      if (f !== 'all') items = items.filter(d => d.type === f);
      
      countEl.textContent = items.length;

      if (!items.length) { grid.innerHTML = '<div class="empty">ไม่พบรายการในหมวดนี้</div>'; return; }

      grid.innerHTML = items.map((d, i) => `
        <div class="card">
          <div class="card-img">
            <img src="${IMGS[d._i % IMGS.length]}" alt="${d.title}" loading="lazy"/>
            <div class="card-tag tag-${d.type}">${typeMap[d.type]}</div>

          </div>
          <div class="card-body">
            <div class="card-loc">${pinSVG} ${d.loc}</div>
            <div class="card-name">${d.title}</div>
            <div class="card-desc">${d.desc.substring(0, 55)}…</div>
            <div class="card-foot">
              <div class="card-price">${d.price}<small>บาท</small></div>
              <div class="card-area">${d.area}</div>
            </div>
            <button class="card-btn" onclick="openDetail(${d._i}, ${d._i})">ดูรายละเอียด / ติดต่อสอบถาม</button>
          </div>
        </div>
      `).join('');

      grid.querySelectorAll('.card').forEach(c => observer.observe(c));
      setTimeout(() => { document.getElementById('bgCanvas').height = document.body.scrollHeight; }, 100);
    }

    document.querySelectorAll('.chip').forEach(c => c.addEventListener('click', () => render(c.dataset.f)));
    render('all');
